apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-node-test
  labels:
    app: node-test
spec:
  replicas: 2
  selector:
    matchLabels:
      app: node-test
  template:
    metadata:
      labels:
        app: node-test
    spec:
      containers:
        - name: simple-node-app
          image: simple-test:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000