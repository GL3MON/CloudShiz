apiVersion: apps/v1
kind: Deployment

metadata:
  name: decoder-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: decoder

  template:
    metadata:
      labels:
        app: decoder

    spec:
      containers:
        - name: decoder-container
          image: tiny-decoder-api
          imagePullPolicy: Never

          ports:
            - containerPort: 8000

          env:
            - name: MODEL_NAME
              valueFrom:
                configMapKeyRef:
                  name: decoder-config
                  key: MODEL_NAME

          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10