apiVersion: apps/v1
kind: Deployment

metadata:
  name: advanced-node-deployment

spec:
  replicas: 3

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  selector:
    matchLabels:
      app: advanced-node

  template:
    metadata:
      labels:
        app: advanced-node

    spec:
      containers:
        - name: node-container
          image: advanced-node
          imagePullPolicy: Never

          ports:
            - containerPort: 3000

          env:
            - name: MESSAGE
              valueFrom:
                configMapKeyRef:
                  name: node-config
                  key: MESSAGE

          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"

          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10